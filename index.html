<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Interactivo</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- TU CSS -->
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>

    <!-- 🔷 NAVBAR -->
    <nav class="navbar navbar-expand-lg glass px-4 py-2">
        <div class="container-fluid">

            <!-- Marca -->
            <span class="navbar-brand fw-bold">🎨 Canvas Interactivo</span>

            <!-- Info -->
            <div class="d-flex gap-4 small align-items-center">
                <span>POO</span>
                <span>Canvas API</span>
                <span>Animación</span>
            </div>

        </div>
    </nav>

    <!-- 🔷 CONTENIDO PRINCIPAL -->
    <div class="container-fluid mt-3">
        <div class="row g-3">

            <!-- 🧭 PANEL IZQUIERDO -->
            <div class="col-md-3">
                <div class="control-panel glass p-4 h-100">

                    <h5 class="mb-4 text-center">⚙️ Controles</h5>

                    <!-- Grupo -->
                    <div class="mb-3">
                        <label class="form-label">Cantidad de círculos</label>
                        <input type="number" id="numCircles" class="form-control input-glass" value="5">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Ancho del canvas</label>
                        <input type="number" id="canvasWidth" class="form-control input-glass" value="600">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Alto del canvas</label>
                        <input type="number" id="canvasHeight" class="form-control input-glass" value="400">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tipo de efecto</label>
                        <select id="effect" class="form-select input-glass">
                            <option value="normal">🎯 Normal</option>
                            <option value="up">🚀 Desde abajo</option>
                            <option value="center">↔️ Desde lados</option>
                            <option value="asteroids">☄️ Asteroides</option>
                            <option value="superbounce">💥 Super rebote</option>
                        </select>
                    </div>

                    <!-- Botón -->
                    <button id="applyBtn" class="btn btn-pink w-100 mt-3">
                        Aplicar cambios
                    </button>

                </div>
            </div>

            <!-- 🎯 CANVAS -->
            <div class="col-md-9">
                <div class="glass p-3 canvas-container d-flex justify-content-center align-items-center">
                    <canvas id="canvas"></canvas>
                </div>
            </div>

        </div>
    </div>

    <!-- 🔷 FOOTER -->
    <footer class="mt-3 p-3 glass">
        <div class="container text-center">

            <p class="fw-bold mb-1">Jesús</p>
            <p class="small mb-2">Estudiante de Ingeniería en Sistemas</p>

            <div class="d-flex justify-content-center gap-4 small">
                <span>Canvas API</span>
                <span>POO</span>
                <span>Simulación gráfica</span>
            </div>

        </div>
    </footer>

    <script src="./assets/js/main.js"></script>
</body>
