<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Interactivo</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>

<body>

    <!-- 🔷 NAVBAR -->
    <nav class="navbar navbar-dark bg-dark glass">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Canvas POO</span>
        </div>
    </nav>

    <!-- 🔷 CONTENIDO -->
    <div class="container mt-4">

        <!-- Panel de control -->
        <div class="glass p-4 mb-4">
            <div class="row g-3">

                <div class="col-md-3">
                    <label>Círculos</label>
                    <input type="number" id="numCircles" class="form-control" value="5">
                </div>

                <div class="col-md-3">
                    <label>Ancho Canvas</label>
                    <input type="number" id="canvasWidth" class="form-control" value="600">
                </div>

                <div class="col-md-3">
                    <label>Alto Canvas</label>
                    <input type="number" id="canvasHeight" class="form-control" value="400">
                </div>

                <div class="col-md-3 d-flex align-items-end">
                    <button id="applyBtn" class="btn btn-primary w-100">
                        Aplicar cambios
                    </button>
                </div>

            </div>
        </div>

        <!-- Canvas -->
        <div class="glass p-3 text-center">
            <canvas id="canvas"></canvas>
        </div>

    </div>

    <!-- 🔷 FOOTER -->
    <footer class="text-center mt-4 p-3 glass">
        <p>Desarrollado por Jesús - Ingeniería en Sistemas</p>
    </footer>

    <script src="./assets/js/main.js"></script>
</body>

</html>
